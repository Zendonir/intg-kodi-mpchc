services:
  kodi-mpchc:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: intg-kodi-mpchc
    restart: unless-stopped
    network_mode: host
    environment:
      - UC_INTEGRATION_HTTP_PORT=9090
      - UC_CONFIG_HOME=/app/config
    volumes:
      - ./config:/app/config
