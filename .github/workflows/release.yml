name: Package & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Package integration zip
        run: |
          TAG=${{ steps.version.outputs.tag }}
          ZIP="intg-kodi-mpchc-${TAG}.zip"
          zip -j "$ZIP" driver.json requirements.txt src/*.py
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "intg-kodi-mpchc ${{ steps.version.outputs.tag }}"
          body: |
            ## Kodi / MPC-HC Bridge — UC Remote 3 Integration

            ### Installation
            1. Lade `intg-kodi-mpchc-*.zip` herunter
            2. Öffne die UC Remote App → Integrationen → Aus Datei installieren
            3. Wähle die ZIP-Datei aus
            4. Setup-Flow: Bridge-Host und Port eingeben (Standard: `localhost:13590`)

            ### Voraussetzungen
            - [kodi-mpchc-bridge](https://github.com/Zendonir/kodi-mpchc-bridge/releases) läuft auf dem Windows-PC
            - Bridge-Port 13590 ist in der Firewall freigegeben
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: ${{ env.ZIP }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
