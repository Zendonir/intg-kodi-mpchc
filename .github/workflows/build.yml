# Build a self-contained aarch64 binary and publish as GitHub Release
# Modelled after https://github.com/albaintor/integration-kodi and the
# official UC AndroidTV integration.
---
name: "Build & Release"

on:
  push:
    branches: [main]
    tags:
      - v[0-9]+.[0-9]+.[0-9]+*
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release (e.g. v0.8.0). Leave empty for dev build."
        required: false
        default: ""

permissions:
  contents: write

env:
  INTG_NAME: kodi-mpchc
  HASH_FILENAME: uc-intg-kodi-mpchc.hash
  PYTHON_VER: 3.11.13-0.4.0

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 200
          ref: ${{ inputs.tag || github.ref }}

      - name: Fetch all tags to determine version
        run: |
          git fetch origin +refs/tags/*:refs/tags/*
          if [ -n "${{ inputs.tag }}" ]; then
            echo "VERSION=${{ inputs.tag }}" >> $GITHUB_ENV
          else
            echo "VERSION=v$(jq .version -r driver.json)" >> $GITHUB_ENV
          fi

      - name: Verify driver.json version for release build
        if: contains(github.ref, 'tags/v')
        run: |
          DRIVER_VERSION="v$(jq .version -r driver.json)"
          TAG_VERSION="${{ github.ref_name }}"
          if [ "$TAG_VERSION" != "$DRIVER_VERSION" ]; then
            echo "Version in driver.json ($DRIVER_VERSION) doesn't match git tag ($TAG_VERSION)!"
            exit 1
          fi

      - name: Install QEMU for aarch64
        run: |
          sudo apt-get update && sudo apt-get install -y qemu binfmt-support qemu-user-static
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Build aarch64 binary with PyInstaller
        run: |
          echo "Starting PyInstaller build for aarch64"
          docker run --rm --name builder \
            --platform=linux/arm64/v8 \
            --user=$(id -u):$(id -g) \
            -v ${GITHUB_WORKSPACE}:/workspace \
            docker.io/unfoldedcircle/r2-pyinstaller:${PYTHON_VER} \
            bash -c \
            "cd /workspace && \
              python -m pip install -r requirements.txt && \
              pyinstaller --clean --onedir --name driver src/driver.py"

      - name: Add version
        run: |
          mkdir -p artifacts
          cd artifacts
          echo ${{ env.VERSION }} > version.txt

      - name: Prepare artifacts
        shell: bash
        run: |
          cp -r dist/driver artifacts/
          mv artifacts/driver artifacts/bin
          cp driver.json artifacts/
          echo "ARTIFACT_NAME=uc-intg-${{ env.INTG_NAME }}-${{ env.VERSION }}-aarch64" >> $GITHUB_ENV

      - name: Create archive
        shell: bash
        run: |
          tar czvf ${{ env.ARTIFACT_NAME }}.tar.gz -C ${GITHUB_WORKSPACE}/artifacts .
          ls -lah ${{ env.ARTIFACT_NAME }}.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.tar.gz
          if-no-files-found: error
          retention-days: 3

  release:
    name: Create Release
    if: >
      github.ref == 'refs/heads/main' ||
      contains(github.ref, 'tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    runs-on: ubuntu-22.04
    needs: [build]

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4

      - name: Extract archives from downloaded artifact directories
        run: |
          for D in */; do
            if [ -d "${D}" ]; then
              mv "$D"* ./
            fi
          done

      - name: Get timestamp
        run: echo "TIMESTAMP=$(date +"%Y%m%d_%H%M%S")" >> $GITHUB_ENV

      - name: Add timestamp to development builds
        if: "!contains(github.ref, 'tags/v') && inputs.tag == ''"
        run: |
          for f in *.tar.gz; do mv "$f" "$(basename $f .tar.gz)-${{ env.TIMESTAMP }}.tar.gz"; done
          for f in *.tar.gz; do echo "sha256  $(sha256sum $f)" >> ${{ env.HASH_FILENAME }}; done

      - name: Create Pre-Release (main push)
        if: "!contains(github.ref, 'tags/v') && inputs.tag == ''"
        uses: softprops/action-gh-release@v2
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          tag_name: "latest"
          prerelease: true
          name: "Development Build"
          files: |
            *.tar.gz
            ${{ env.HASH_FILENAME }}

      - name: Create checksums for release
        if: "contains(github.ref, 'tags/v') || inputs.tag != ''"
        run: |
          for f in *.tar.gz; do echo "sha256  $(sha256sum $f)" >> ${{ env.HASH_FILENAME }}; done

      - name: Create Release (version tag)
        if: "contains(github.ref, 'tags/v') || inputs.tag != ''"
        uses: softprops/action-gh-release@v2
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          tag_name: ${{ inputs.tag || github.ref_name }}
          prerelease: false
          files: |
            *.tar.gz
            ${{ env.HASH_FILENAME }}
